app:
  release: "v0.1.2"
  environment: "development"

data:
  raw: "data/raw/youth_policies.json"
  sqlite_db: "data/sqlite/youth_policies.db"
  conversation_db: "data/sqlite/conversations.db"
  chroma_dir: "data/chroma/"
  chroma_collection_name: "youth_policies_rag"

retriever:
  provider: "upstage"
  query_model: "solar-embedding-1-large-query"
  passage_model: "solar-embedding-1-large-passage"
  mode: "hybrid"
  search_k: 3
  dense_candidate_k: 10
  bm25_candidate_k: 50
  hybrid_dense_weight: 0.65
  hybrid_rrf_k: 1

llm:
  provider: "deepseek"
  model: "deepseek-v4-flash"

rag:
  planner:
    history_window: 6
  policy_checker:
    max_retries: 3
  answer_generator:
    history_window: 10

evaluation:
  example_path: "data/eval/eval_v1_50.jsonl"
  provider: "anthropic"
  model: "claude-haiku-4-5"
  dataset_name: "PolicyRAGEval_v2_50"
  experiment_prefix: "260709"
  max_concurrency: 3

database:
  echo: true
